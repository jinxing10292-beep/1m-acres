<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼국: 계절의 패자</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- 상단 바: 자원 및 시간 정보 -->
        <div class="top-bar">
            <div class="resource-display">
                <div class="resource-item">
                    <span class="resource-label">식량</span>
                    <span class="resource-value" id="food">0</span>
                </div>
                <div class="resource-item">
                    <span class="resource-label">목재</span>
                    <span class="resource-value" id="wood">0</span>
                </div>
                <div class="resource-item">
                    <span class="resource-label">석재</span>
                    <span class="resource-value" id="stone">0</span>
                </div>
            </div>
            <div class="time-display">
                <span id="pageInfo">거점</span>
            </div>
        </div>

        <!-- 중앙 맵 뷰 -->
        <div class="map-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- 하단 패널 -->
        <div class="bottom-panel">
            <div class="panel-section">
                <h3>병사</h3>
                <div id="unitPanel" class="unit-panel"></div>
            </div>
            <div class="panel-section">
                <h3>페이지</h3>
                <div id="buildingPanel" class="building-panel"></div>
            </div>
        </div>
    </div>

    <script src="resource-system.js"></script>
    <script src="land-system.js"></script>
    <script src="simple-units.js"></script>
    <script src="base-system.js"></script>
    <script src="page-system.js"></script>
    <script src="save-system.js"></script>
    <script src="game-new.js"></script>
</body>
</html>
